<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalorieFlow | Smart Tracking</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0F2027, #203A43, #2C5364); color: white; text-align: center; margin: 0; padding: 80px 20px; min-height: 100vh; }
        h1 { font-size: 3.5rem; margin-bottom: 10px; letter-spacing: 2px; }
        p { color: #ccc; max-width: 600px; margin: 0 auto 40px; line-height: 1.6; }
        .download-btn { background: #6C63FF; color: white; padding: 18px 40px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; display: inline-block; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3); }
        .download-btn:hover { background: #8077ff; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(108, 99, 255, 0.5); }
        footer { margin-top: 150px; font-size: 0.9rem; color: #888; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; }
        footer a { color: #888; text-decoration: none; transition: 0.3s; }
        footer a:hover { color: #fff; }
    </style>
</head>
<body>
    <h1>CalorieFlow</h1>
    <p>The smartest and cleanest way to track your daily calorie goals. Download the Android app now and start your journey to a healthier you.</p>
    <a href="#" id="downloadLink" class="download-btn">Loading latest version...</a>
    <script>
        fetch('https://api.github.com/repos/papinashvilisergi/calorie-calculator/releases/latest')
            .then(response => response.json())
            .then(data => {
                const asset = data.assets.find(a => a.name === 'CalorieFlow.apk');
                if (asset) {
                    const btn = document.getElementById('downloadLink');
                    btn.href = asset.browser_download_url;
                    btn.textContent = "Download CalorieFlow (Latest APK)";
                } else {
                    document.getElementById('downloadLink').textContent = "APK not found";
                }
            })
            .catch(() => document.getElementById('downloadLink').textContent = "Error loading link");
    </script>
    <footer>
        <p>Website built by Sergi Papinashvili | ✉ <a href="mailto:papinashvilisergi@gmail.com">papinashvilisergi@gmail.com</a></p>
    </footer>
</body>
</html>
